<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Freebie Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>🎮 Freebie Tracker</h1>
        <p>Track free games you can keep forever</p>
    </header>

    <section class="filters">
        <button onclick="filterItems('all')">All</button>
        <button onclick="filterItems('permanent')">Permanent</button>
        <button onclick="filterItems('temporary')">Temporary</button>
        <button onclick="filterItems('expiring')">Expiring Soon</button>
    </section>

    <main id="list"></main>

    <footer>
        <p>Auto-updated every 6 hours via GitHub Actions</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
