<!doctype html>
<span id="stat-limited">0</span>
<label>Limited-time</label>
</div>
<div class="stat">
    <span id="stat-permanent">0</span>
    <label>Permanent</label>
</div>
</section>
</header>

<main class="shell main">
    <section class="controls" aria-label="Filters">
        <input id="search" type="search" placeholder="Search offers" />

        <select id="sourceFilter" aria-label="Filter by store">
            <option value="all">All stores</option>
            <option value="gog">GOG</option>
            <option value="epic">Epic</option>
            <option value="steam">Steam</option>
        </select>

        <select id="typeFilter" aria-label="Filter by type">
            <option value="all">All types</option>
            <option value="limited-time">Limited-time</option>
            <option value="permanent">Permanent</option>
        </select>
    </section>

    <section class="meta-row">
        <p id="updatedAt">Loading…</p>
        <p>Source data is refreshed by GitHub Actions.</p>
    </section>

    <section id="offers" class="grid" aria-live="polite"></section>
</main>

<template id="offer-template">
    <article class="card">
        <div class="card-top">
            <span class="badge"></span>
            <span class="source"></span>
        </div>
        <h2 class="title"></h2>
        <p class="description"></p>
        <dl class="details">
            <div>
                <dt>Price</dt>
                <dd class="price"></dd>
            </div>
            <div>
                <dt>Window</dt>
                <dd class="window"></dd>
            </div>
        </dl>
        <a class="link" target="_blank" rel="noreferrer">Open store page</a>
    </article>
</template>

<script type="module" src="assets/app.js"></script>
</body>

</html>
