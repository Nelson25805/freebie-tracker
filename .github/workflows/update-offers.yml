name: Update offers

on:
    workflow_dispatch:
    schedule:
        - cron: "0 10 * * 1"

permissions:
    contents: write

jobs:
    update:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browser
              run: npx playwright install --with-deps chromium

            - name: Restore Prime auth state
              env:
                  PRIME_STORAGE_STATE_B64: ${{ secrets.PRIME_STORAGE_STATE_B64 }}
              run: |
                  mkdir -p playwright/.auth
                  if [ -n "$PRIME_STORAGE_STATE_B64" ]; then
                    printf '%s' "$PRIME_STORAGE_STATE_B64" | base64 -d > playwright/.auth/prime.json
                  fi

            - name: Update Epic
              run: npm run update:epic

            - name: Update Prime
              run: npm run update:prime

            - name: Build combined offers
              run: npm run build

            - name: Commit changes
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add data/epic.json data/prime.json data/offers.json
                  git commit -m "Update offers" || exit 0
                  git push
