name: Update offers

on:
    workflow_dispatch:
    schedule:
        - cron: "0 10 * * 1"

jobs:
    update:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Generate offers JSON
              run: node scripts/update-offers.mjs

            - name: Commit and push if changed
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add data/offers.json
                  git commit -m "Update offers" || exit 0
                  git push
