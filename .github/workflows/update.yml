name: Update offers

on:
    schedule:
        - cron: "15 3 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    scrape-and-commit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm install

            - name: Scrape stores
              run: npm run scrape

            - name: Commit updated data
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add data/offers.json
                  git commit -m "Update offers" || exit 0
                  git push
